<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real World Budget Challenge — Financial Literacy Simulation</title>
  <meta name="description" content="A high school financial literacy simulation where students earn a real entry-level salary, pay taxes, and make monthly spending decisions." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:        #f1f5f9;
      --bg-card:        #ffffff;
      --bg-muted:       #f8fafc;
      --text-primary:   #0f172a;
      --text-muted:     #475569;
      --text-subtle:    #94a3b8;
      --border:         #e2e8f0;
      --border-med:     #cbd5e1;
      --radius-md:      8px;
      --radius-lg:      12px;
      --mono:           'Courier New', Courier, monospace;

      --primary:        #4f46e5;
      --primary-hover:  #4338ca;
      --primary-light:  #eef2ff;
      --primary-border: #c7d2fe;

      --info-text:      #1d4ed8;
      --info-bg:        #eff6ff;
      --info-border:    #bfdbfe;
      --success-text:   #15803d;
      --success-bg:     #f0fdf4;
      --success-border: #86efac;
      --danger-text:    #b91c1c;
      --danger-bg:      #fef2f2;
      --danger-border:  #fca5a5;
      --warn-text:      #92400e;
      --warn-bg:        #fffbeb;
      --warn-border:    #fcd34d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    #app { max-width: 660px; margin: 0 auto; }

    /* Typography */
    h1 { font-size: 26px; font-weight: 700; margin-bottom: .4rem; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: .4rem; }
    p  { font-size: 15px; line-height: 1.65; }
    .label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-muted); margin-bottom: .3rem; font-weight: 600;
    }
    .step-tag {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-muted); margin-bottom: .35rem; font-weight: 600;
    }
    .mono { font-family: var(--mono); }

    /* Cards */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem;
    }
    .card-head {
      background: var(--bg-muted); border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
    }
    .card-body { padding: 1.25rem; }

    /* Badges */
    .badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .badge-info    { background: var(--primary-light); color: var(--primary);      border: 1px solid var(--primary-border); }
    .badge-success { background: var(--success-bg);    color: var(--success-text); border: 1px solid var(--success-border); }
    .badge-danger  { background: var(--danger-bg);     color: var(--danger-text);  border: 1px solid var(--danger-border); }
    .badge-warn    { background: var(--warn-bg);       color: var(--warn-text);    border: 1px solid var(--warn-border); }

    /* Alerts */
    .alert {
      border-radius: var(--radius-md); padding: 1rem 1.25rem;
      margin-bottom: 1rem; font-size: 14px; line-height: 1.65;
    }
    .alert-warn    { background: var(--warn-bg);    color: var(--warn-text);    border: 1px solid var(--warn-border); }
    .alert-success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
    .alert-danger  { background: var(--danger-bg);  color: var(--danger-text);  border: 1px solid var(--danger-border); }
    .alert-info    { background: var(--info-bg);    color: var(--info-text);    border: 1px solid var(--info-border); }

    /* Buttons */
    button {
      font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer;
      border-radius: var(--radius-md); padding: .65rem 1.5rem;
      border: 1px solid var(--border-med); background: var(--bg-card);
      color: var(--text-primary); transition: background .12s, opacity .12s, transform .08s;
    }
    button:hover   { background: var(--bg-muted); }
    button:active  { transform: scale(.98); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-full { width: 100%; text-align: center; display: block; }

    /* Progress bar */
    .progress { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s ease; }

    /* Table rows */
    .row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: .65rem 0; border-bottom: 1px solid var(--border); gap: .5rem;
    }
    .row:last-child { border-bottom: none; }

    /* Budget summary grid */
    .budget-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: .6rem; }
    .budget-cell {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: .75rem;
    }

    /* Budget usage bar */
    .budget-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 1rem; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 4px; transition: width .35s ease, background .35s ease; }

    /* Choice cards */
    .choice {
      border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: .9rem 1rem; margin-bottom: .6rem; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; transition: background .1s, border-color .1s;
    }
    .choice:hover    { background: var(--bg-muted); border-color: var(--border-med); }
    .choice.selected { border: 2px solid var(--primary); background: var(--primary-light); }
    .choice.warn-card             { border-color: #fca5a5; }
    .choice.warn-card:hover       { background: var(--danger-bg); }
    .choice.selected.warn-card    { border: 2px solid #dc2626; background: var(--danger-bg); }

    /* Spin box */
    .spin-box {
      min-height: 160px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 1.5rem;
    }

    /* Intro hero */
    .hero {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff; border-radius: var(--radius-lg); padding: 2.25rem 1.5rem 2rem;
      margin-bottom: 1rem; text-align: center;
    }
    .hero h1  { color: #fff; font-size: 28px; margin-bottom: .5rem; }
    .hero p   { color: rgba(255,255,255,.82); font-size: 15px; }
    .hero-tag { color: rgba(255,255,255,.6); font-size: 12px; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; margin-bottom: .5rem; }

    /* Station top color strip */
    .station-strip { height: 5px; }

    /* Tax visual bar */
    .tax-bar-row  { display: flex; height: 40px; border-radius: 6px; overflow: hidden; gap: 2px; }
    .tax-bar-seg  { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; min-width: 0; overflow: hidden; }
    .tax-bar-leg  { display: flex; gap: 1rem; margin-top: .5rem; flex-wrap: wrap; }
    .tax-bar-dot  { font-size: 12px; color: var(--text-muted); }

    /* Life event card */
    .event-body  { padding: 2.25rem 1.5rem 1.75rem; text-align: center; }
    .event-emoji { font-size: 60px; margin-bottom: .75rem; line-height: 1; }
    .event-outcome {
      border-radius: var(--radius-md); padding: 1rem 1.25rem;
      margin: 1.25rem 0; text-align: left;
    }

    /* Reflection list */
    .reflect-list li { font-size: 14px; line-height: 1.7; color: var(--text-muted); margin-bottom: .65rem; }

    /* Misc */
    .footnote    { font-size: 11px; color: var(--text-subtle); text-align: center; margin-bottom: 1rem; }
    .step-row    { display: flex; gap: 12px; align-items: flex-start; margin-bottom: .9rem; }
    .ded-note    { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }
  </style>
</head>

const STATIONS = [
  { id: 'housing', name: 'Housing & Rent',

let S = {
  phase: 'intro',
  job: null, taxes: null,
  spinning: false, spinJob: null,
  stIdx: 0, choices: {}, selChoice: null,
  drawnEvents: [], lifeImpact: 0, evtIdx: 0,

/* ===================================================================
   UTILITIES
   =================================================================== */
function calcTaxes(sal) {
  const mg = sal / 12;
  const ti = Math.max(0, sal - 14600);
  let fa = 0;
  if      (ti <= 11600)  fa = ti * 0.10;
  else if (ti <= 47150)  fa = 1160 + (ti - 11600) * 0.12;
  else                   fa = 5426 + (ti - 47150) * 0.22;
  const fed = fa / 12;
  const pa  = sal * 0.0307 / 12;
  const ss  = mg  * 0.062;
  const mc  = mg  * 0.0145;
  const tot = fed + pa + ss + mc;
  return { mg, fed, pa, ss, mc, tot, net: mg - tot };
}

function cur(n, dec = 0) {
  return new Intl.NumberFormat('en-US', {
    style: 'currency', currency: 'USD',
    minimumFractionDigits: dec, maximumFractionDigits: dec
  }).format(n);
}

function choiceCost(c) {
  return c.pct !== undefined ? S.taxes.net * c.pct : (c.cost || 0);
}

function totalSpent() {
  return Object.values(S.choices).reduce((a, c) => a + c.cost, 0);
}

function baseRemaining() {
  return S.taxes ? S.taxes.net - totalSpent() : 0;
}

function finalRemaining() {
  return baseRemaining() + (S.lifeImpact || 0);
}

function budgetBarPct(spent, net) {
  return Math.min(100, Math.max(0, (spent / net) * 100));
}

function budgetBarColor(spent, net) {
  const p = spent / net;
  if (p < 0.6)  return '#4f46e5';
  if (p < 0.8)  return '#ca8a04';
  if (p < 1.0)  return '#ea580c';
  return '#dc2626';
}

function drawLifeEvents() {
  const majors = LIFE_EVENTS.filter(e => e.tier === 'major');
  const minors = LIFE_EVENTS.filter(e => e.tier === 'minor');
  const maj = majors[Math.floor(Math.random() * majors.length)];
  const min = minors[Math.floor(Math.random() * minors.length)];
  S.drawnEvents = [maj, min].map(e => ({ event: e, outcome: e.outcome(S) }));
  S.lifeImpact  = S.drawnEvents.reduce((a, d) => a + d.outcome.amt, 0);
}

function renderLifeEvent() {
  const { event: ev, outcome: out } = S.drawnEvents[S.evtIdx];
  const isLast  = S.evtIdx === S.drawnEvents.length - 1;
  const isGood  = out.type === 'good';
  const isCrisis = out.type === 'crisis';

  const bgColor  = isCrisis ? 'var(--danger-bg)'  : isGood ? 'var(--success-bg)'  : 'var(--warn-bg)';
  const txColor  = isCrisis ? 'var(--danger-text)' : isGood ? 'var(--success-text)' : 'var(--warn-text)';
  const bdColor  = isCrisis ? 'var(--danger-border)': isGood ? 'var(--success-border)' : 'var(--warn-border)';
  const topColor = isCrisis ? '#dc2626' : isGood ? '#16a34a' : '#d97706';

  const amtLabel = out.amt === 0 ? 'No impact' : out.amt > 0 ? `+ ${cur(out.amt)}` : `− ${cur(Math.abs(out.amt))}`;
  const amtColor = out.amt > 0 ? '#16a34a' : out.amt < 0 ? '#dc2626' : 'var(--text-muted)';

  return `
    <p class="step-tag">Unexpected Event ${S.evtIdx + 1} of 2</p>

    <p style="color:var(--text-muted);margin-bottom:1.5rem">Real life doesn't follow a budget. Here's what happened this month.</p>

        <div class="event-outcome" style="background:${bgColor};border:1px solid ${bdColor}">
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${txColor};margin-bottom:.4rem">What happened</p>
          <p style="color:${txColor};font-size:14px;line-height:1.7">${out.msg}</p>
        </div>

        <p style="font-size:34px;font-weight:800;color:${amtColor};font-family:var(--mono);margin-top:.25rem">
          ${amtLabel}
          <span style="font-size:14px;font-weight:400;color:var(--text-muted);font-family:inherit"> this month</span>

  `;
}

  // Four-tier outcome

  if (fin < -200) {
    tierClass = 'alert-danger';
    tierTitle = `⚠️ Financial Crisis — You are ${cur(Math.abs(fin), 2)} over budget`;
    tierMsg   = 'Your expenses plus unexpected events have pushed you well past your income. In real life, this means missed payments, credit card debt, and compounding interest. Something has to change immediately.';
  } else if (fin < 0) {
    tierClass = 'alert-danger';
    tierTitle = `You are ${cur(Math.abs(fin), 2)} over budget this month`;
    tierMsg   = 'Your expenses exceed your income. At least one spending decision needs to change — and life events made it worse.';

    tierClass = 'alert-warn';
    tierTitle = `Barely making it — ${cur(fin, 2)} left over`;
    tierMsg   = 'Technically you broke even, but one more unexpected expense would put you in the red. You have almost no margin for error.';

        <div class="row" style="border-bottom:none;font-weight:700;font-size:16px">

      <div class="card-body">
        ${STATIONS.map(st => {
          const c = S.choices[st.id];

          return `
            <div class="row">

/* ===================================================================
   SPIN LOGIC
   =================================================================== */
function doSpin() {
  if (S.spinning) return;
  S.spinning = true;
  S.job      = null;
  let idx    = Math.floor(Math.random() * JOBS.length);
  S.spinJob  = JOBS[idx];
  render();

  let count = 0;
  spIntvl = setInterval(() => {
    idx = (idx + 1) % JOBS.length;
    S.spinJob = JOBS[idx];
    const box = document.getElementById('spin-box');
    if (box) {
      box.innerHTML = `
        <p class="label" style="margin-bottom:.4rem">Assigning...</p>
        <p style="font-size:22px;font-weight:700;margin-bottom:.3rem;color:var(--primary)">${JOBS[idx].title}</p>
        <p style="color:var(--text-muted);font-size:14px">${JOBS[idx].employer}</p>
      `;
    }
    count++;
    if (count >= 32) {
      clearInterval(spIntvl);
      S.spinning = false;
      S.job      = JOBS[idx];
      S.spinJob  = null;
      S.taxes    = calcTaxes(S.job.salary);
      render();
    }
  }, 75);
}

   RENDER + ATTACH
   =================================================================== */
function render() {
  const app = document.getElementById('app');
  if      (S.phase === 'intro')       app.innerHTML = renderIntro();
  else if (S.phase === 'spin')        app.innerHTML = renderSpin();
  else if (S.phase === 'paystub')     app.innerHTML = renderPaystub();
  else if (S.phase === 'stations')    app.innerHTML = renderStations();
  else if (S.phase === 'life_events') app.innerHTML = renderLifeEvent();
  else if (S.phase === 'report')      app.innerHTML = renderReport();
  attach();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function attach() {
  const on = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); };

  on('btn-start',    () => { S.phase = 'spin'; render(); });
  on('btn-spin',     () => doSpin());
  on('btn-accept',   () => { S.phase = 'paystub'; render(); });
  on('btn-stations', () => { S.phase = 'stations'; S.stIdx = 0; S.choices = {}; S.selChoice = null; render(); });

  on('btn-confirm', () => {
    if (S.selChoice === null) return;
    const st   = STATIONS[S.stIdx];
    const c    = st.choices[S.selChoice];
    const cost = choiceCost(c);
    S.choices[st.id] = { label: c.label, cost, warn: c.warn || false };
    S.selChoice = null;
    if (S.stIdx < STATIONS.length - 1) {
      S.stIdx++;
      render();
    } else {
      drawLifeEvents();
      S.phase  = 'life_events';
      S.evtIdx = 0;
      render();
    }
  });

  on('btn-next-event', () => {
    if (S.evtIdx < S.drawnEvents.length - 1) {
      S.evtIdx++;
      render();
    } else {
      S.phase = 'report';
      render();
    }
  });

  document.querySelectorAll('.choice').forEach(el => {
    el.addEventListener('click', () => {
      S.selChoice = parseInt(el.dataset.ci);
      render();
    });
  });
}

render();
</script>
</body>
</html>
